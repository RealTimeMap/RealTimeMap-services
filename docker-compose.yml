include:
  - services/mark-service/docker-compose.yml
  - services/gamification-service/docker-compose.yml
  - services/social-service/docker-compose.yml
  - docker-compose.kafka.yml

services:
  traefik:
    image: traefik:v3.6.1
    environment:
      - DOCKER_API_VERSION=1.45
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /etc/letsencrypt/live/realtimemap.ru:/etc/letsencrypt/live/realtimemap.ru:ro
      - /etc/letsencrypt/archive/realtimemap.ru:/etc/letsencrypt/archive/realtimemap.ru:ro
    networks:
      - web

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - redis-network

volumes:
  redis_data:

networks:
  web:
    external: true
  redis-network:
    external: true
    name: redis-network